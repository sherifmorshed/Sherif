<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wells App</title>

<style>
body{
  background:#0a0e14;
  color:#e0eaf5;
  font-family:sans-serif;
  padding:10px;
}

/* BUTTON */
button{
  background:#00d4ff;
  border:none;
  padding:8px 12px;
  margin:4px;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

/* TABLE */
.substation-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  margin-top:10px;
}

.substation-table th{
  background:#111720;
  color:#00d4ff;
  padding:8px;
}

.substation-table td{
  padding:8px;
}

/* ZEBRA */
.substation-table tbody tr:nth-child(odd){
  background: rgba(255,255,255,0.03);
}
.substation-table tbody tr:nth-child(even){
  background: rgba(0,0,0,0.15);
}
.substation-table tbody tr:hover{
  background: rgba(0,212,255,0.08);
}
</style>
</head>

<body>

<h2>Substations</h2>

<div id="list"></div>
<div id="view"></div>

<script>

// ===== LOAD DATA FROM LOCAL STORAGE =====
let wells = JSON.parse(localStorage.getItem("wellsData") || "[]");

// ===== GROUP =====
function groupSubstations(){
  let map = {};
  wells.forEach(w=>{
    let s = w["SUBSTATION"] || "Unknown";
    if(!map[s]) map[s]=[];
    map[s].push(w);
  });
  return map;
}

// ===== SHOW LIST =====
function showList(){
  let data = groupSubstations();
  let html = "";

  Object.keys(data).sort().forEach(s=>{
    html += `<button onclick="openSub('${s}')">${s}</button><br>`;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("view").innerHTML = "";
}

// ===== OPEN SUB =====
function openSub(name){

  let wellsList = groupSubstations()[name];

  let totalAct=0, totalNet=0;
  let prod=0, wo=0, rig=0;

  wellsList.forEach(w=>{
    let act = parseFloat(w["ACT , M3/D"]) || 0;
    let net = parseFloat(w["ACT NET "]) || 0;

    totalAct += act;
    totalNet += net;

    if(w["Status"]==="Producer") prod++;
    else if(w["Status"]==="Waiting Work Over") wo++;
    else rig++;
  });

  let netRounded = Math.round(totalNet/5)*5;
  let netBbl = Math.round(netRounded * 6.2898);

  let html = `
  <button onclick="showList()">⬅ Back</button>

  <h3>Substation: ${name}</h3>

  <div style="margin:10px 0;">
    <b>ACT:</b> ${Math.round(totalAct)} m³/d<br>
    <b>NET:</b> ${netRounded} m³/d (${netBbl} bbl/d)<br>
    <b>Wells:</b> ${wellsList.length} |
    Prod: ${prod} |
    WO: ${wo} |
    Rig: ${rig}
  </div>

  <table class="substation-table">
  <thead>
    <tr>
      <th>Well</th>
      <th>TK</th>
      <th>ACT</th>
      <th>WC%</th>
      <th>NET</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  `;

  wellsList.forEach(w=>{

    let act = w["ACT , M3/D"] || "";
    let wc = w["ACT.W.C %"] || "";
    let netRaw = parseFloat(w["ACT NET "]) || 0;
    let net = Math.round(netRaw/5)*5;

    html += `
    <tr>
      <td>${w["Well"]}</td>
      <td>${w["TK Battery"]}</td>
      <td>${act}</td>
      <td>${wc}</td>
      <td>${net}</td>
      <td><button onclick="alert('${w["Well"]}')">Open</button></td>
    </tr>`;
  });

  html += "</tbody></table>";

  document.getElementById("view").innerHTML = html;
  document.getElementById("list").innerHTML = "";
}

// INIT
showList();

</script>

</body>
</html>
